# Serve blog Astro tĩnh — mount vào /etc/nginx/conf.d/default.conf
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json
               image/svg+xml application/xml application/rss+xml
               text/plain application/wasm;

    # Asset fingerprint của Astro — bất biến, cache 1 năm
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Index Pagefind đổi theo mỗi lần build — cache ngắn
    location /pagefind/ {
        add_header Cache-Control "public, max-age=3600";
    }

    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
