# Chạy blog trên server:
#   docker compose pull && docker compose up -d
# Image GHCR mặc định là private — set package visibility Public trên GitHub,
# hoặc `docker login ghcr.io` trên server trước khi pull.
services:
  blog:
    image: ghcr.io/chinh00/my-blog:latest
    # Build tại chỗ không cần registry: comment dòng image, mở dòng build
    # build: .
    ports:
      - "8080:80"
    restart: unless-stopped
